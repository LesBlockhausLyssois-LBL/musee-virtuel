<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>Choix du blockhaus</title>
<link rel="icon" type="image/png" href="https://i.postimg.cc/Y2g29xsg/Design-sans-titre-(30).png"/>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BASE */
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background-image:url("arriereplan.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.page{
background-color:rgba(255,255,255,0.9);
min-height:100vh;
padding:50px 20px;
}

/* HEADER */
header{
text-align:center;
background:#e0e0e0;
padding:25px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

header h1{
margin:0;
font-size:34px;
}

header p{
margin-top:8px;
font-style:italic;
font-size:18px;
}

/* CONTENEUR DES OPTIONS */
.selection{
display:flex;
justify-content:space-around;
align-items:flex-start;
flex-wrap:wrap;
margin-top:50px;
}

/* CHAQUE BLOCKHAUS */
.blockhaus{
flex:0 1 45%;
text-align:center;
margin-bottom:40px;
}

.blockhaus img{
width:100%;
max-width:400px;
border-radius:10px;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

.blockhaus .bouton{
display:inline-block;
background:linear-gradient(145deg,#f4f4f4,#d8d8d8);
border:2px solid #333;
padding:12px 25px;
margin-top:15px;
font-size:18px;
text-decoration:none;
color:black;
border-radius:12px;
box-shadow:4px 4px 12px rgba(0,0,0,0.25);
transition:0.25s;
}

.blockhaus .bouton:hover{
transform:translateY(-4px) scale(1.03);
box-shadow:6px 6px 16px rgba(0,0,0,0.3);
}

/* BOUTON GENERAL */
.bouton-general{
display:block;
background:linear-gradient(145deg,#f4f4f4,#d8d8d8);
border:2px solid #333;
padding:14px 30px;
margin:50px auto 0 auto;
font-size:20px;
text-decoration:none;
color:black;
border-radius:14px;
box-shadow:4px 4px 12px rgba(0,0,0,0.25);
transition:0.25s;
text-align:center;
}

.bouton-general:hover{
transform:translateY(-4px) scale(1.03);
box-shadow:6px 6px 16px rgba(0,0,0,0.3);
}

/* MOBILE */
@media screen and (max-width:768px){

header h1{
font-size:26px;
}

header p{
font-size:16px;
}

.blockhaus{
flex:0 1 100%;
margin-bottom:30px;
}

.blockhaus .bouton{
font-size:16px;
padding:10px 20px;
}

.bouton-general{
font-size:18px;
padding:12px 25px;
}

}
</style>

</head>
<body>

<div class="page">

<header>
<h1>Choisissez un blockhaus</h1>
</header>

<div class="selection">

<!-- BLOCKHAUS ANGLAIS -->
<div class="blockhaus">
<img src="Photos/pillbox.jpg" alt="Blockhaus Anglais">
<a href="visite/aceuilpillbox.html" class="bouton">Pillbox de la BEF</a>
</div>

<!-- BLOCKHAUS FRANÇAIS -->
<div class="blockhaus">
<img src="Photos/bloc.jpg" alt="Blockhaus Français">
<a href="visite/schemadc.html" class="bouton">Bloc Français de 1939</a>
</div>

</div>

<!-- BOUTON GENERAL -->
<a href="https://lesblockhauslyssois-lbl.github.io/musee-virtuel/" class="bouton-general">Retour à l’accueil</a>

</div>

</body>
</html>
