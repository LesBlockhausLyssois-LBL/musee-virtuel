<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Y2g29xsg/Design-sans-titre-(30).png" />
    <meta charset="UTF-8">
    <title>Photo - Musée virtuel</title>

    <!-- Optimisation mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        /* ===========================
           BASE
           =========================== */

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-image: url("arriereplan.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .page {
            background-color: rgba(255,255,255,0.88);
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* ===========================
           HEADER
           =========================== */

        header {
            text-align: center;
            background-color: #e0e0e0;
            padding: 30px 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        header h1 {
            margin: 0;
            font-size: 36px;
        }

        /* ===========================
           IMAGE
           =========================== */

        .container {
            width: 80%;
            margin: 40px auto;
            text-align: center;
        }

        .photo {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            border: 3px solid #333;
            box-shadow: 6px 6px 15px rgba(0,0,0,0.3);
        }

        /* ===========================
           BOUTON
           =========================== */

        .bouton {
            display: inline-block;
            background: linear-gradient(145deg, #f4f4f4, #d8d8d8);
            border: 2px solid #333;
            padding: 15px 30px;
            margin-top: 30px;
            font-size: 20px;
            text-decoration: none;
            color: black;
            border-radius: 14px;
            box-shadow: 4px 4px 12px rgba(0,0,0,0.25);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .bouton:hover {
            transform: translateY(-6px) scale(1.04);
            box-shadow: 8px 8px 20px rgba(0,0,0,0.35);
        }

        .bouton:active {
            transform: scale(0.97);
        }

        /* ===========================
           MOBILE
           =========================== */

        @media screen and (max-width: 768px) {

            header h1 {
                font-size: 26px;
            }

            .container {
                width: 95%;
                margin: 25px auto;
            }

            .bouton {
                width: 100%;
                font-size: 18px;
                padding: 16px;
            }

        }

    </style>
</head>

<body>

<div class="page">

<header>
    <h1>Photographie</h1>
</header>

<div class="container">

    <!-- PHOTO -->
    <img src="pillboxentree.jpg" alt="Photo du blockhaus" class="photo">

    <!-- BOUTON RETOUR -->
    <div>
        <a href="pillboxaceuil.html" class="bouton">Retour au schéma</a>
    </div>

</div>

</div>

</body>
</html>
