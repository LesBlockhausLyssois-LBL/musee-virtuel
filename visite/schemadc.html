<!DOCTYPE html>
<html lang="fr">
<head>

<link rel="icon" type="image/png" href="https://i.postimg.cc/Y2g29xsg/Design-sans-titre-(30).png"/>

<meta charset="UTF-8">
<title>Structure d’un blockhaus</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ================= BASE ================= */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background-image:url("arriereplan.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.page{
background-color:rgba(255,255,255,0.9);
min-height:100vh;
padding-bottom:60px;
}

/* ================= HEADER ================= */

header{
text-align:center;
background:#e0e0e0;
padding:30px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

header h1{
margin:0;
font-size:34px;
}

header p{
margin-top:10px;
font-style:italic;
}

/* ================= CONTENU ================= */

.container{
width:85%;
max-width:1000px;
margin:auto;
padding-top:30px;
}

.section{
text-align:center;
margin-bottom:50px;
}

.section h2{
font-size:26px;
margin-bottom:20px;
}

/* ================= PHOTO ================= */

.photo{
width:100%;
max-width:700px;
border-radius:10px;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

/* ================= SCHEMA ================= */

.schema{
position:relative;
width:100%;
max-width:800px;
margin:auto;
}

.schema img{
width:100%;
display:block;
}

/* ================= LIENS ================= */

.lien{
position:absolute;
transform:translate(-50%,-50%);
background:rgba(255,255,255,0.85);
padding:6px 10px;
border-radius:6px;
text-decoration:none;
color:black;
font-weight:bold;
transition:0.2s;
white-space:nowrap;
}

.lien:hover{
background:white;
transform:translate(-50%,-50%) scale(1.05);
}

/* ================= POSITIONS ================= */

.creneau_gauche{
top:40%;
left:8%;
}

.creneau_droit{
top:40%;
left:92%;
}

.creneau_interieur{
top:35%;
left:63%;
}

.interieur{
top:40%;
left:40%;
}

.sas{
top:58%;
left:50%;
}

.exterieur{
top:82%;
left:50%;
}

/* ================= BOUTON ================= */

.bouton{
display:inline-block;
background:linear-gradient(145deg,#f4f4f4,#d8d8d8);
border:2px solid #333;
padding:15px 30px;
margin-top:30px;
font-size:20px;
text-decoration:none;
color:black;
border-radius:14px;
box-shadow:4px 4px 12px rgba(0,0,0,0.25);
}

/* ================= MOBILE ================= */

@media screen and (max-width:768px){

header h1{
font-size:26px;
}

.section h2{
font-size:20px;
}

.lien{
font-size:12px;
padding:4px 6px;
}

.creneau_gauche{
left:15%;
}

.creneau_droit{
left:85%;
}

}

</style>
</head>

<body>

<div class="page">

<header>
<h1>Structure d’un blockhaus</h1>
<p>Schéma interactif d’un pillbox</p>
</header>

<div class="container">

<div class="section">

<h2>Exemple de blockhaus</h2>

<img class="photo" src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Blockhaus_normandie.jpg">

</div>

<div class="section">

<h2>Schéma interactif</h2>

<div class="schema">

<img src="schema2.png">

<a class="lien creneau_gauche" href="#">créneau gauche</a>

<a class="lien creneau_droit" href="#">créneau droit</a>

<a class="lien creneau_interieur" href="#">créneau intérieur</a>

<a class="lien interieur" href="#">intérieur</a>

<a class="lien sas" href="#">sas</a>

<a class="lien exterieur" href="#">extérieur</a>

</div>

</div>

<div style="text-align:center">

<a href="https://lesblockhauslyssois-lbl.github.io/musee-virtuel/" class="bouton">
Retour à l’accueil
</a>

</div>

</div>

</div>

</body>
</html>
